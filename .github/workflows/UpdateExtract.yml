name: Extract Text

on:
  workflow_dispatch:
    inputs:
      JP_Enabled: { type: boolean, default: false }
      GL_Enabled: { type: boolean, default: false }
      CN_Enabled: { type: boolean, default: false }
  repository_dispatch:
    types: [Extract]

permissions:
  contents: write

jobs:
  setup:
    name: 配置
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_jobs: ${{ steps.set-matrix.outputs.run_jobs }}
      gl: ${{ steps.detect.outputs.gl }}
      jp: ${{ steps.detect.outputs.jp }}
    steps:
      - name: Detect Trigger Source
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "jp=${{ github.event.client_payload.JP_enabled || 'false' }}" >> $GITHUB_OUTPUT
            echo "gl=${{ github.event.client_payload.GL_enabled || 'false' }}" >> $GITHUB_OUTPUT
            echo "cn=${{ github.event.client_payload.CN_enabled || 'false' }}" >> $GITHUB_OUTPUT
          else
            echo "jp=${{ github.event.inputs.JP_Enabled }}" >> $GITHUB_OUTPUT
            echo "gl=${{ github.event.inputs.GL_Enabled }}" >> $GITHUB_OUTPUT
            echo "cn=${{ github.event.inputs.CN_Enabled }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate Strategy Matrix
        id: set-matrix
        run: |
          MATRIX=$(jq -nc \
            --arg jp "${{ steps.detect.outputs.jp }}" \
            --arg gl "${{ steps.detect.outputs.gl }}" \
            --arg cn "${{ steps.detect.outputs.cn }}" \
            '[
              {id: "JP", name: "日服", enabled: $jp},
              {id: "GL", name: "国际服", enabled: $gl},
              {id: "CN", name: "国服", enabled: $cn}
            ] | map(select(.enabled == "true" or .enabled == true))')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "run_jobs=$(echo $MATRIX | jq '. | length')" >> $GITHUB_OUTPUT

  deploy:
    needs: setup
    if: needs.setup.outputs.run_jobs != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}
    name: 提取${{ matrix.name }}
    steps:
      - name: Checkout Tool Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts

      - name: Clone Required Repositories
        run: |
          git clone --depth 1 --branch ${{ matrix.id }} git@github.com:beichen23333/BA-Text.git BA-Text
          git clone --branch ${{ matrix.id }} git@github.com:beichen23333/BA-Assets-TableBundles.git Assets-Repo
          git clone --depth 2 --branch ${{ matrix.id }} git@github.com:beichen23333/BA-All-Text.git BA-All-Text

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Prepare Tool Environment
        run: |
          git clone --depth 1 git@github.com:beichen23333/BlueArchive-Translation.git tool
          cp -r tool/* . && rm -rf tool
          pip install -r requirements.txt
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Get Version info
        id: v
        run: |
          SERVER_ID_LOWER=$(echo "${{ matrix.id }}" | tr '[:upper:]' '[:lower:]')
          bash other/version.sh ${{ matrix.id }} info_${SERVER_ID_LOWER}.json >> "$GITHUB_OUTPUT"

      - name: Get Previous Base Version
        id: prev_v
        run: |
          SERVER_ID_LOWER=$(echo "${{ matrix.id }}" | tr '[:upper:]' '[:lower:]')
          ORIGINAL_FILE="info_${SERVER_ID_LOWER}.json"
          # 直接拿上一个记录作为对比基准，不管版本号是否相同
          PREV_JSON=$(git show HEAD^:"$ORIGINAL_FILE" 2>/dev/null || echo "")
          if [ -n "$PREV_JSON" ]; then
            echo "$PREV_JSON" > /tmp/prev_info.json
            bash other/version.sh ${{ matrix.id }} /tmp/prev_info.json >> "$GITHUB_OUTPUT"
          else
            echo "BA_VERSION_NAME=${{ steps.v.outputs.BA_VERSION_NAME }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync All-Text Repository
        id: sync_all
        run: |
          NEW_ZIP="Assets-Repo/${{ matrix.name }}${{ steps.v.outputs.BA_VERSION_NAME }}.zip"
          OUT_ZIP="BA-All-Text/${{ matrix.name }}${{ steps.v.outputs.BA_VERSION_NAME }}.zip"
          # 仅在资源文件确实存在时更新 All-Text 基准
          if [ -f "$NEW_ZIP" ]; then
            python -m tools.clean "$NEW_ZIP" "$OUT_ZIP" ${{ matrix.id }}
            cd BA-All-Text
            git add .
            if ! git diff --cached --quiet; then
              git commit -m "Sync Base: ${{ steps.v.outputs.BA_VERSION_NAME }}"
              git push origin ${{ matrix.id }}
            fi
          fi

      - name: Run Extract
        id: extract_step
        run: |
          CUR_ZIP="BA-All-Text/${{ matrix.name }}${{ steps.v.outputs.BA_VERSION_NAME }}.zip"
          OLD_ZIP="Assets-Repo/${{ matrix.name }}${{ steps.prev_v.outputs.BA_VERSION_NAME }}.zip"
          
          rm -rf BA-Text/New BA-Text/Revise
          
          python -m tools.extract "$CUR_ZIP" "$OLD_ZIP" "./BA-Text" ${{ matrix.id }}
          
          # 检查 New 或 Revise 下是否有文件
          COUNT=$(find BA-Text/New BA-Text/Revise -name "*.json" 2>/dev/null | wc -l)
          echo "Changes found: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "HAS_CONTENT=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CONTENT=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push to BA-Text
        if: steps.extract_step.outputs.HAS_CONTENT == 'true'
        run: |
          cd BA-Text
          git add New/ Revise/
          git commit -m "提取 ${{ matrix.id }} text: ${{ steps.v.outputs.BA_VERSION_NAME }} (from ${{ steps.prev_v.outputs.BA_VERSION_NAME }})"
          git push origin ${{ matrix.id }}

  Final:
    name: 部署
    needs: [setup, deploy]
    if: always() && needs.setup.outputs.jp == 'true' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH Access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa github.com >> ~/.ssh/known_hosts

      - name: Clone Required Repositories
        run: |
          git clone --depth 1 --branch ${{ matrix.id }} git@github.com:beichen23333/BA-Text.git BA-Text

      - name: Check Recent Activity
        id: check
        run: |
          LAST_COMMIT_TIME=$(git log -1 --format=%ct)
          NOW=$(date +%s)
          if [ $((NOW - LAST_COMMIT_TIME)) -lt 300 ]; then
            echo "TRIGGER=true" >> $GITHUB_OUTPUT
          else
            echo "TRIGGER=false" >> $GITHUB_OUTPUT
          fi
      - name: Deploy Translation
        if: steps.check.outputs.TRIGGER == 'true'
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -d '{"event_type": "Translation","client_payload": {"file_path": "BA-Text/New|BA-Text/Revise","output_path": "BA-Text/Translation|BA-Text/Translation_Revise", "batch_size": "20","max_workers": "10"}}'
